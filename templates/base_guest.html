<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pool CRM - {% block title %}Управление бассейном{% endblock %}</title>
    <link rel="stylesheet" href="/static/style.css">
    <script src="/static/bubbles.js" defer></script>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Анимированный фон бассейна -->
    <div class="background-pool">
        <div class="water"></div>
        <div class="tile-pattern"></div>
        <div class="waves"></div>
        <div class="gleam"></div>
        <div class="bubbles"></div>
    </div>

    <!-- КОНТЕНТ (без обёртки, без шапки, без меню) -->
    {% block content %}{% endblock %}
</body>
</html>
