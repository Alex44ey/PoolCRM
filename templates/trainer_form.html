{% extends "base.html" %}

{% block title %}{{ title }}{% endblock %}

{% block content %}
<h2>{{ title }}</h2>

{% if error %}
<div class="alert alert-error">{{ error }}</div>
{% endif %}

<form method="POST">
    <div class="form-group">
        <label class="required">ФИО тренера</label>
        <input type="text" name="name" required value="{{ coach.name|default('') }}">
    </div>

    <div class="form-row">
        <div class="form-group">
            <label class="required">Email</label>
            <input type="email" name="email" required value="{{ coach.email|default('') }}">
        </div>
        <div class="form-group">
            <label>Телефон</label>
            <input type="tel" name="phone" value="{{ coach.phone|default('') }}">
        </div>
    </div>

    <div class="form-group">
        <label {% if not coach.id %}class="required"{% endif %}>Пароль</label>
        <input type="password" name="password" {% if not coach.id %}required{% endif %}>
        {% if coach.id %}
        <small style="color: #666;">Оставьте пустым, чтобы не менять пароль</small>
        {% endif %}
    </div>

    <div style="display: flex; gap: 15px; margin-top: 30px;">
        <button type="submit" class="btn btn-primary">Сохранить</button>
        <a href="/trainers" class="btn btn-secondary">Отмена</a>
    </div>
</form>
{% endblock %}
